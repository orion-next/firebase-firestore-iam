name: firebase-firestore-iam
version: 0.2.0
specVersion: v1beta
license: apache-2.0
author:
  authorName: Vidush H. Namah
  url: https://github.com/orion-next/firebase-firestore-iam
description: Synchronize authentication users with Firestore account documents, with event logs, soft delete, and scheduled hard purge.

resources:
  - name: SyncAccountOnUserCreated
    type: firebaseextensions.v1beta.function
    description: Sync Firestore account document when a Firebase user is created.
    properties:
      location: us-central1
      runtime: nodejs22
      entryPoint: SyncAccountOnUserCreated
      eventTrigger:
        eventType: providers/firebase.auth/eventTypes/user.create

  - name: DeleteAccountOnUserDeleted
    type: firebaseextensions.v1beta.function
    description: Soft delete Firestore account document when a Firebase user is deleted.
    properties:
      location: us-central1
      runtime: nodejs22
      entryPoint: DeleteAccountOnUserDeleted
      eventTrigger:
        eventType: providers/firebase.auth/eventTypes/user.delete

  - name: SyncUserOnAccountCreated
    type: firebaseextensions.v1beta.function
    description: Sync Firebase user when Firestore account document is created.
    properties:
      location: us-central1
      runtime: nodejs22
      entryPoint: SyncUserOnAccountCreated
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/Accounts/{email}
  
  - name: SyncUserOnAccountUpdated
    type: firebaseextensions.v1beta.function
    description: Sync Firebase user when Firestore account document is updated.
    properties:
      location: us-central1
      runtime: nodejs22
      entryPoint: SyncUserOnAccountUpdated
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/Accounts/{email}

  - name: DeleteUserOnAccountDeleted
    type: firebaseextensions.v1beta.function
    description: Soft delete Firestore account document and hard delete Firebase user when Firestore account document is deleted.
    properties:
      location: us-central1
      runtime: nodejs22
      entryPoint: DeleteUserOnAccountDeleted
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/Accounts/{email}

params:
  - param: DELETE_DOC_ON_USER_DELETED
    label: Soft Delete Document on User Deleted
    description: Whether to soft delete the Firestore account document when a Firebase user is deleted.
    type: boolean
    default: true

  - param: REVOKE_TOKEN_ON_USER_UPDATED
    label: Revoke Token on User Update
    description: Whether to revoke refresh tokens when user properties or claims are updated.
    type: boolean
    default: true
  
  - param: ALLOWED_CLAIMS
    label: "Allowed Custom Claims"
    description: "Comma-separated list of claims that can be set on users."
    default: "role, group"
